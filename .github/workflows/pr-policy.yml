name: pr-policy

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, labeled, unlabeled, ready_for_review]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Validate release labels
        run: python3 scripts/release.py check-pr --event "$GITHUB_EVENT_PATH"
