name: publish

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check-version.outputs.version }}
      should_release: ${{ steps.check-version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Check for unreleased changelog
        id: check-version
        run: |
          if grep -q "^## \[Unreleased\]" CHANGELOG.md; then
            V=$(grep '^version: ' skills/openagents/SKILL.md | sed 's/^version: *//')
            echo "version=$V" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Run validator
        run: bash scripts/validate.sh

      - name: Validate agentskills.io spec
        continue-on-error: true
        run: |
          if command -v skills-ref >/dev/null 2>&1; then
            skills-ref validate ./skills/openagents
          else
            echo "skills-ref not installed; attempting npx (best-effort)..."
            npx -y skills-ref@latest validate ./skills/openagents || \
              echo "WARN: skills-ref unavailable — skipping agentskills.io spec validation"
          fi

      - name: Create git tag
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION" "${{ github.sha }}"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            --target "${{ github.sha }}"