name: publish
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/validate.sh

  release:
    name: Create release
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          prev_tag=$(git tag --sort=-version:refname | head -2 | tail -1 || echo "")
          if [ -n "$prev_tag" ]; then
            log=$(git log "$prev_tag"..HEAD --oneline --no-decorate)
          else
            log=$(git log --oneline --no-decorate "$(git rev-list --max-parents=0 HEAD)"..HEAD)
          fi
          {
            echo 'changelog<<EOF'
            echo "$log"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## OpenAgents v${{ steps.version.outputs.tag }}

            ${{ steps.changelog.outputs.changelog }}

            ---

            ### Install / Update

            ```bash
            # Via skills.sh (any agent)
            npx skills add luismtns/openagents

            # Via Claude Code plugin
            /plugin install openagents@luismtns/openagents

            # Via Make (clone or update)
            git clone https://github.com/luismtns/openagents.git
            cd openagents && make install
            ```

            ### Contents

            - 6 OpenAgents skills (install, init, setup-rules, sync, audit, skills)
            - Claude Code plugin format
            - Project rules (.agents/rules/)
            - Local validator (scripts/validate.sh)
          generate_release_notes: true
          make_latest: true
