name: validate
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-skills:
    name: Validate skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run validator
        run: bash scripts/validate.sh

      - name: Check claude-plugin integrity
        run: |
          errors=0
          if [ ! -f claude-plugin/.claude-plugin/plugin.json ]; then
            echo "ERROR: plugin.json missing"; errors=$((errors+1))
          fi
          if [ ! -L claude-plugin/skills ]; then
            echo "ERROR: claude-plugin/skills is not a symlink"; errors=$((errors+1))
          elif [ "$(readlink claude-plugin/skills)" != "../skills" ]; then
            echo "ERROR: claude-plugin/skills symlink target mismatch"; errors=$((errors+1))
          fi
          if [ "$errors" -gt 0 ]; then
            echo "FAILED: $errors integrity errors"
            exit 1
          fi
          echo "claude-plugin integrity OK"

      - name: Check skills.sh.json
        run: |
          if ! jq -e '.groupings' skills.sh.json > /dev/null 2>&1; then
            echo "ERROR: skills.sh.json missing 'groupings' field"
            exit 1
          fi
          if ! jq -e '.["$schema"]' skills.sh.json > /dev/null 2>&1; then
            echo "ERROR: skills.sh.json missing '\$schema'"
            exit 1
          fi
          echo "skills.sh.json OK"
