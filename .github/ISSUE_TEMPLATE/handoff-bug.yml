name: Handoff bug
description: Report incorrect, unsafe, or incomplete handoff behavior
title: "[handoff] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Use synthetic data only. Do not paste credentials or private code.
  - type: input
    id: agent
    attributes:
      label: Agent and version
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
